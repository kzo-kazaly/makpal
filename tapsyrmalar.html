<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Математикалық – логикалық кейс тапсырмалар</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --grass: #7BC67E;
    --sun: #FFD93D;
    --pink: #FF6B9D;
    --purple: #A855F7;
    --orange: #FF8C42;
    --teal: #00C9A7;
    --red: #FF4757;
    --blue: #3A86FF;
    --yellow: #FFD166;
    --bg: #FFF9F0;
    --shadow: 0 8px 32px rgba(0,0,0,0.13);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Sky background */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, #b3e5fc 0%, #e1f5e1 60%, #fff9e6 100%);
  }

  /* Clouds */
  .cloud {
    position: fixed; z-index: 1; opacity: .7;
    animation: floatCloud linear infinite;
    font-size: 3rem; user-select: none; pointer-events: none;
  }
  @keyframes floatCloud {
    0%   { transform: translateX(-150px); }
    100% { transform: translateX(110vw); }
  }

  /* Sparkles */
  .sparkle {
    position: fixed; z-index: 1; font-size: 1.4rem;
    animation: twinkle 2s ease-in-out infinite alternate;
    pointer-events: none; user-select: none;
  }
  @keyframes twinkle {
    from { opacity:.2; transform: scale(.8) rotate(-10deg); }
    to   { opacity:.9; transform: scale(1.2) rotate(10deg); }
  }

  /* Header */
  header {
    position: relative; z-index: 10;
    text-align: center; padding: 28px 20px 10px;
  }
  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    color: #fff;
    text-shadow: 3px 4px 0 #FF6B9D, 6px 8px 0 rgba(0,0,0,.12);
    letter-spacing: 1px;
    animation: bounceIn .9s cubic-bezier(.36,.07,.19,.97) both;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 1rem; color: #5c6fa8; font-weight: 700;
    margin-top: 6px; letter-spacing: 1px;
    animation: fadeUp .9s .3s both;
  }
  @keyframes bounceIn {
    0%  { transform: scale(0) rotate(-6deg); opacity: 0; }
    70% { transform: scale(1.08) rotate(2deg); opacity: 1; }
    100%{ transform: scale(1) rotate(0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Tabs */
  .tabs-wrapper {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: 12px;
    padding: 16px 20px;
    flex-wrap: wrap;
  }
  .tab-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 12px 28px;
    border: none; border-radius: 50px;
    cursor: pointer;
    transition: all .25s;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    color: #fff;
    letter-spacing: .5px;
  }
  .tab-btn.math {
    background: linear-gradient(135deg, #3A86FF, #1565c0);
  }
  .tab-btn.science {
    background: linear-gradient(135deg, #00C9A7, #009688);
  }
  .tab-btn.active {
    transform: scale(1.08);
    box-shadow: 0 8px 28px rgba(0,0,0,.22);
  }
  .tab-btn:not(.active) {
    opacity: .65;
  }
  .tab-btn:hover { transform: scale(1.1); opacity: 1; }

  /* Progress bar */
  .progress-wrap {
    position: relative; z-index: 10;
    max-width: 800px; margin: 0 auto; padding: 0 20px 10px;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-weight: 700; font-size: .9rem; color: #5c6fa8;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    height: 14px; background: rgba(255,255,255,.7);
    border-radius: 20px; overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.1);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B9D, #A855F7, #3A86FF);
    border-radius: 20px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* Main content */
  .content {
    position: relative; z-index: 10;
    max-width: 800px; margin: 0 auto;
    padding: 10px 20px 120px;
  }

  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* Question card */
  .q-card {
    background: rgba(255,255,255,.92);
    border-radius: 24px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    animation: slideUp .4s ease both;
    border-left: 6px solid;
    transition: box-shadow .2s;
  }
  .q-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.18); }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Card color borders by index mod 8 */
  .q-card.c0 { border-color: #FF6B9D; }
  .q-card.c1 { border-color: #FF8C42; }
  .q-card.c2 { border-color: #A855F7; }
  .q-card.c3 { border-color: #3A86FF; }
  .q-card.c4 { border-color: #00C9A7; }
  .q-card.c5 { border-color: #FFD93D; }
  .q-card.c6 { border-color: #FF4757; }
  .q-card.c7 { border-color: #7BC67E; }

  .q-number {
    font-family: 'Fredoka One', cursive;
    font-size: .85rem; font-weight: 900;
    color: #aaa; letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .q-text {
    font-size: 1.05rem; font-weight: 700; color: #2d3748;
    margin-bottom: 16px; line-height: 1.45;
  }

  /* Answer options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) {
    .options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-radius: 14px;
    border: 2.5px solid #e2e8f0;
    background: #fff;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: .92rem; font-weight: 700;
    color: #4a5568;
    text-align: left;
    transition: all .18s;
  }
  .opt-btn:hover:not(.locked) {
    border-color: #A855F7;
    background: #faf5ff;
    transform: scale(1.03);
  }
  .opt-letter {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    background: #f0f4f8;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: .8rem;
    transition: all .18s;
    flex-shrink: 0;
  }
  .opt-btn:hover:not(.locked) .opt-letter {
    background: #A855F7; color: #fff;
  }

  /* Selected */
  .opt-btn.selected {
    border-color: #3A86FF;
    background: linear-gradient(135deg, #ebf4ff, #f0f8ff);
  }
  .opt-btn.selected .opt-letter {
    background: #3A86FF; color: #fff;
  }

  /* After reveal: correct / wrong */
  .opt-btn.correct {
    border-color: #00C9A7;
    background: linear-gradient(135deg, #e0fdf4, #f0fff8);
  }
  .opt-btn.correct .opt-letter {
    background: #00C9A7; color: #fff;
  }
  .opt-btn.wrong {
    border-color: #FF4757;
    background: linear-gradient(135deg, #fff1f2, #fff5f5);
  }
  .opt-btn.wrong .opt-letter {
    background: #FF4757; color: #fff;
  }
  .opt-btn.locked { cursor: default; }

  /* Answered indicator on card */
  .q-card.answered .q-number::after {
    content: ' ✓';
    color: #00C9A7;
  }

  /* Bottom sticky bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,249,240,.95);
    backdrop-filter: blur(8px);
    border-top: 2px solid rgba(168,85,247,.15);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .bottom-info {
    font-weight: 700; color: #5c6fa8; font-size: .9rem;
  }
  .reveal-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; letter-spacing: .5px;
    padding: 12px 32px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #FF6B9D, #A855F7);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168,85,247,.4);
    transition: all .22s;
  }
  .reveal-btn:hover { transform: scale(1.07); box-shadow: 0 8px 28px rgba(168,85,247,.5); }
  .reveal-btn:disabled {
    background: #ccc; box-shadow: none; cursor: not-allowed; transform: none;
  }

  /* Score modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 32px;
    padding: 40px 36px;
    max-width: 420px; width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: popModal .4s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes popModal {
    from { transform: scale(.5) rotate(-8deg); opacity:0; }
    to   { transform: scale(1) rotate(0); opacity:1; }
  }
  .modal-emoji { font-size: 4rem; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem; color: #2d3748; margin-bottom: 8px;
  }
  .modal-score {
    font-size: 3.5rem; font-weight: 900;
    background: linear-gradient(135deg, #FF6B9D, #A855F7, #3A86FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 10px 0;
  }
  .modal-sub { color: #718096; font-weight: 700; font-size: 1rem; margin-bottom: 20px; }
  .modal-feedback {
    font-size: 1.1rem; font-weight: 700; color: #4a5568;
    margin-bottom: 24px; line-height: 1.4;
  }
  .modal-close {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 12px 36px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #3A86FF, #A855F7);
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 16px rgba(58,134,255,.35);
    transition: transform .2s;
  }
  .modal-close:hover { transform: scale(1.08); }

  /* Grass */
  .grass-strip {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 2;
    font-size: 2.5rem; text-align: center;
    pointer-events: none; user-select: none;
    letter-spacing: -4px; line-height: .8;
    opacity: .5;
  }

  /* Stagger animation for cards */
  .q-card:nth-child(1)  { animation-delay: .05s }
  .q-card:nth-child(2)  { animation-delay: .08s }
  .q-card:nth-child(3)  { animation-delay: .11s }
  .q-card:nth-child(4)  { animation-delay: .14s }
  .q-card:nth-child(5)  { animation-delay: .17s }
  .q-card:nth-child(6)  { animation-delay: .20s }
  .q-card:nth-child(7)  { animation-delay: .23s }
  .q-card:nth-child(8)  { animation-delay: .26s }
  .q-card:nth-child(9)  { animation-delay: .29s }
  .q-card:nth-child(10) { animation-delay: .32s }

  footer {
    position: relative; z-index: 10;
    text-align: center; padding: 16px;
    font-size: .82rem; color: #9e9e9e; font-weight: 700;
  }

  /* Section label */
  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem; color: #fff;
    background: linear-gradient(135deg, #A855F7, #3A86FF);
    display: inline-block;
    padding: 6px 24px;
    border-radius: 50px;
    margin-bottom: 16px;
    box-shadow: 0 4px 14px rgba(168,85,247,.35);
    letter-spacing: .5px;
  }
  .section-divider {
    text-align: center;
    margin: 28px 0 18px;
  }

  /* Confetti particle */
  .confetti-particle {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 300;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="sky-bg"></div>
<div class="cloud" style="top:6%; animation-duration:18s; animation-delay:0s;">☁️</div>
<div class="cloud" style="top:16%; animation-duration:25s; animation-delay:-9s; font-size:2rem;">☁️</div>
<div class="cloud" style="top:4%;  animation-duration:32s; animation-delay:-16s; font-size:4rem;">☁️</div>

<div class="sparkle" style="top:10%;left:7%; animation-delay:.3s;">⭐</div>
<div class="sparkle" style="top:22%;left:92%; animation-delay:.7s;">🌟</div>
<div class="sparkle" style="top:65%;left:4%; animation-delay:1.1s;">✨</div>
<div class="sparkle" style="top:72%;left:94%; animation-delay:.5s;">⭐</div>
<div class="sparkle" style="top:38%;left:2%; animation-delay:1.5s;">🌟</div>
<div class="sparkle" style="top:48%;left:96%; animation-delay:.9s;">✨</div>

<header>
  <div class="header-title">🧮 Математикалық – логикалық<br>және тілдік-әдістемелік кейс тапсырмалар</div>
  <div class="header-sub">Тестті орындап, жауабыңды тексер! 🌈</div>
</header>

<!-- Tab buttons -->
<div class="tabs-wrapper">
  <button class="tab-btn math active" onclick="switchTab('math')">🔢 Математика (30 сұрақ)</button>
  <button class="tab-btn science" onclick="switchTab('science')">🌿 Жаратылыстану (30 сұрақ)</button>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 60 жауапталды</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- MATH SECTION -->
  <div class="section-panel active" id="panel-math"></div>

  <!-- SCIENCE SECTION -->
  <div class="section-panel" id="panel-science"></div>

</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <div class="bottom-info" id="bottomInfo">Барлық 60 сұраққа жауап бер</div>
  <button class="reveal-btn" id="revealBtn" onclick="revealAnswers()">
    📋 Жауаптарды тексеру
  </button>
</div>

<!-- Score modal -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal-box">
    <div class="modal-emoji" id="modalEmoji">🏆</div>
    <div class="modal-title">Нәтиже!</div>
    <div class="modal-score" id="modalScore">0/60</div>
    <div class="modal-sub" id="modalSub">балл жинадың</div>
    <div class="modal-feedback" id="modalFeedback">Жарайсың!</div>
    <button class="modal-close" onclick="closeModal()">✅ Жабу</button>
  </div>
</div>

<div class="grass-strip">🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿🌱🌿</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const MATH_QUESTIONS = [
  {
    q: "Дүкенге 48 кг алма әкелінді. Оның 19 кг-ы сатылды. Дүкенде неше килограмм алма қалды?",
    opts: ["27 кг", "29 кг", "31 кг", "67 кг"],
    ans: 1
  },
  {
    q: "24 дәптердің әрқайсысы 5 теңгеден. Барлығы неше теңге болады?",

    ans: 2
  },
  {
    q: "Бір аптада 7 күн бар. 5 аптада неше күн болады?",

    ans: 1
  },
  {
    q: "Тік төртбұрыштың ұзындығы 9 см, ені 4 см. Периметрін тап.",

    ans: 2
  },
  {
    q: "120 санын 4-ке бөл.",
    opts: ["20", "25", "30", "40"],
    ans: 2
  },
  {
    q: "Сыныпта 14 қыз және 12 ұл бар. Барлығы неше оқушы?",
    opts: ["24", "25", "26", "28"],
    ans: 2
  },
  {
    q: "Егер x = 4 болса, y = 3x + 2. y мәнін тап.",
    opts: ["10", "12", "14", "16"],
    ans: 2
  },
  {
    q: "1 метрде неше сантиметр бар?",
    opts: ["10 см", "100 см", "1000 см", "50 см"],
    ans: 1
  },
  {
    q: "36 : 6 = ?",
    opts: ["5", "6", "7", "8"],
    ans: 1
  },
  {
    q: "Бір қорапта 8 қарындаш бар. 6 қорапта неше қарындаш болады?",

    ans: 2

  {

  {

  {

const SCIENCE_QUESTIONS = [
  {
    q: "Адам тыныс алу үшін не қажет?",
    opts: ["Су", "Ауа", "Топырақ", "Жарық"],
    ans: 1
  },

// ── STATE ─────────────────────────────────────────────────────────────────────
const LETTERS = ['A', 'B', 'C', 'D'];
const COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];
const userAnswers = {
  math: new Array(MATH_QUESTIONS.length).fill(null),
  science: new Array(SCIENCE_QUESTIONS.length).fill(null)
};
let revealed = false;
let currentTab = 'math';

// ── BUILD UI ──────────────────────────────────────────────────────────────────
function buildSection(panelId, questions, prefix) {
  const panel = document.getElementById(panelId);
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = `q-card ${COLORS[i % 8]}`;
    card.id = `card-${prefix}-${i}`;

    const optsHTML = q.opts.map((opt, oi) => `
      <button class="opt-btn" id="opt-${prefix}-${i}-${oi}"
        onclick="selectAnswer('${prefix}', ${i}, ${oi})">
        <span class="opt-letter">${LETTERS[oi]}</span>
        <span>${opt}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Сұрақ ${i + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
    `;
    panel.appendChild(card);
  });
}

buildSection('panel-math', MATH_QUESTIONS, 'math');
buildSection('panel-science', SCIENCE_QUESTIONS, 'science');

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn.' + tab).classList.add('active');
}

// ── SELECT ANSWER ─────────────────────────────────────────────────────────────
function selectAnswer(prefix, qIdx, optIdx) {
  if (revealed) return;

  userAnswers[prefix][qIdx] = optIdx;

  // Update button styles
  for (let oi = 0; oi < 4; oi++) {
    const btn = document.getElementById(`opt-${prefix}-${qIdx}-${oi}`);
    btn.classList.remove('selected');
  }
  document.getElementById(`opt-${prefix}-${qIdx}-${optIdx}`).classList.add('selected');

  // Mark card answered
  document.getElementById(`card-${prefix}-${qIdx}`).classList.add('answered');

  updateProgress();
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const mathDone = userAnswers.math.filter(a => a !== null).length;
  const sciDone  = userAnswers.science.filter(a => a !== null).length;
  const total = mathDone + sciDone;
  const max = MATH_QUESTIONS.length + SCIENCE_QUESTIONS.length;
  const pct = Math.round((total / max) * 100);

  document.getElementById('progressText').textContent = `${total} / ${max} жауапталды`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = pct + '%';

  const btn = document.getElementById('revealBtn');
  document.getElementById('bottomInfo').textContent =
    total === max ? '✅ Барлық сұрақтарға жауап берілді!' :
    `${max - total} сұрақ қалды`;
}

// ── REVEAL ────────────────────────────────────────────────────────────────────
function revealAnswers() {
  revealed = true;
  let score = 0;

  function processSection(prefix, questions) {
    questions.forEach((q, i) => {
      const userAns = userAnswers[prefix][i];
      const correct = q.ans;

      for (let oi = 0; oi < 4; oi++) {
        const btn = document.getElementById(`opt-${prefix}-${i}-${oi}`);
        btn.classList.remove('selected');
        btn.classList.add('locked');
        if (oi === correct) {
          btn.classList.add('correct');
        } else if (oi === userAns && userAns !== correct) {
          btn.classList.add('wrong');
        }
      }
      if (userAns === correct) score++;
    });
  }

  processSection('math', MATH_QUESTIONS);
  processSection('science', SCIENCE_QUESTIONS);

  const max = MATH_QUESTIONS.length + SCIENCE_QUESTIONS.length;
  showModal(score, max);
  spawnConfetti(score, max);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(score, max) {
  const pct = score / max;
  let emoji, feedback;
  if (pct >= 0.9)      { emoji = '🏆'; feedback = 'Керемет! Өте жақсы нәтиже!'; }
  else if (pct >= 0.7) { emoji = '🌟'; feedback = 'Жақсы! Одан да жақсы болады!'; }
  else if (pct >= 0.5) { emoji = '👍'; feedback = 'Орташа нәтиже. Тырыс!'; }
  else                 { emoji = '📚'; feedback = 'Тағы бір рет оқып шық!'; }

  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalScore').textContent = `${score}/${max}`;
  document.getElementById('modalSub').textContent = `балл жинадың (${Math.round(pct*100)}%)`;
  document.getElementById('modalFeedback').textContent = feedback;
  document.getElementById('scoreModal').classList.add('show');
}

function closeModal() {
  document.getElementById('scoreModal').classList.remove('show');
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function spawnConfetti(score, max) {
  if (score / max < 0.5) return;
  const colors = ['#FF6B9D','#A855F7','#3A86FF','#FFD93D','#00C9A7','#FF8C42'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 1.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ── RANDOM SPARKLE BURSTS ─────────────────────────────────────────────────────
function spawnStarBurst() {
  const count = 4 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.textContent = ['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
    Object.assign(star.style, {
      position:'fixed', left:(15+Math.random()*70)+'vw',
      top:(20+Math.random()*60)+'vh',
      fontSize:(.8+Math.random())+'rem', zIndex:50,
      pointerEvents:'none',
      animation:`starFloat ${1+Math.random()}s ease-out forwards`,
      animationDelay:(Math.random()*.4)+'s'
    });
    document.body.appendChild(star);
    setTimeout(()=>star.remove(), 2000);
  }
}
const bStyle = document.createElement('style');
bStyle.textContent = `@keyframes starFloat{0%{transform:translateY(0) scale(0);opacity:1}100%{transform:translateY(-80px) scale(1.4);opacity:0}}`;
document.head.appendChild(bStyle);
setInterval(spawnStarBurst, 4000);

// init progress
updateProgress();
</script>
